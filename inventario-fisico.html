<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Físico - Revisión de Artículos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #1e293b;
            --color-bg-surface: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-primary: #38bdf8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-base: #ffffff;
                --color-bg-elevated: #f8fafc;
                --color-bg-surface: #e2e8f0;
                --color-text-primary: #0f172a;
                --color-text-secondary: #475569;
                --color-text-muted: #64748b;
                --color-primary: #0284c7;
            }
        }

        body {
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .btn-quantity {
            font-size: 2rem;
            width: 4rem;
            height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-primary);
            color: var(--color-bg-base);
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .btn-quantity:active {
            transform: scale(0.95);
        }

        .card-field {
            background: var(--color-bg-elevated);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 2px solid var(--color-bg-surface);
        }

        .card-field.editable {
            border-color: var(--color-primary);
            cursor: pointer;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-pending { background: #64748b; color: white; }
        .status-confirmed { background: var(--color-success); color: white; }
        .status-modified { background: var(--color-primary); color: white; }
        .status-new { background: var(--color-warning); color: white; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal.active {
            display: flex;
        }

        .list-item {
            padding: 1rem;
            border-bottom: 1px solid var(--color-bg-surface);
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover {
            background: var(--color-bg-elevated);
        }

        .list-item.active {
            background: var(--color-primary);
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Cabecera -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold mb-4" style="color: var(--color-primary)">Inventario Físico</h1>
            
            <!-- Carga de archivo -->
            <div id="uploadSection" class="card-field mb-4">
                <label for="csvFile" class="block mb-2 font-semibold">Cargar archivo CSV</label>
                <input type="file" id="csvFile" accept=".csv" class="block w-full text-sm" style="color: var(--color-text-primary)">
            </div>

            <!-- Barra de progreso -->
            <div id="progressSection" class="hidden">
                <div class="flex items-center justify-between mb-2">
                    <span id="progressText" class="font-semibold">0 / 0 revisados</span>
                    <div class="flex gap-2">
                        <button onclick="openListModal()" class="px-4 py-2 rounded" style="background: var(--color-primary); color: var(--color-bg-base)">☰ Lista</button>
                        <button onclick="openSearchModal()" class="px-4 py-2 rounded" style="background: var(--color-primary); color: var(--color-bg-base)">🔍 Buscar</button>
                        <button onclick="exportCSV()" class="px-4 py-2 rounded" style="background: var(--color-success); color: white">📥 Exportar</button>
                        <button onclick="resetInventory()" class="px-4 py-2 rounded" style="background: var(--color-error); color: white">🗑️ Reiniciar</button>
                    </div>
                </div>
                <div class="w-full h-3 rounded-full" style="background: var(--color-bg-surface)">
                    <div id="progressBar" class="h-full rounded-full transition-all" style="background: var(--color-success); width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Tarjeta del artículo -->
        <main id="articleCard" class="hidden">
            <div class="card-field mb-4 relative">
                <!-- Navegación -->
                <div class="flex items-center justify-between mb-6">
                    <button onclick="previousArticle()" class="px-6 py-3 text-xl font-bold rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary)">◀ Anterior</button>
                    <span id="articlePosition" class="text-xl font-bold">1 / 269</span>
                    <button onclick="nextArticle()" class="px-6 py-3 text-xl font-bold rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary)">Siguiente ▶</button>
                </div>

                <!-- Estado -->
                <div class="mb-4 text-center">
                    <span id="statusBadge" class="status-badge status-pending">⬜ Pendiente</span>
                </div>

                <!-- Código y Descripción -->
                <div class="text-center mb-6">
                    <div class="text-4xl font-bold mb-2" style="color: var(--color-primary)" id="articleCode">1132</div>
                    <div class="text-2xl mb-4" id="articleDesc">CARDA DE COPA</div>
                </div>

                <!-- Tamaño, Color -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="card-field text-center">
                        <div class="text-sm uppercase mb-2" style="color: var(--color-text-muted)">Tamaño</div>
                        <div class="text-xl font-semibold" id="articleSize">5 pulg</div>
                    </div>
                    <div class="card-field text-center">
                        <div class="text-sm uppercase mb-2" style="color: var(--color-text-muted)">Color</div>
                        <div class="text-xl font-semibold" id="articleColor">—</div>
                    </div>
                </div>

                <!-- N/P y U.M. -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="text-center">
                        <div class="text-sm uppercase mb-2" style="color: var(--color-text-muted)">N/P</div>
                        <div class="text-lg font-semibold" id="articleNP">A-1132-CP</div>
                    </div>
                    <div class="text-center">
                        <div class="text-sm uppercase mb-2" style="color: var(--color-text-muted)">U.M.</div>
                        <div class="text-lg font-semibold" id="articleUM">PZA</div>
                    </div>
                </div>

                <!-- Cantidad (edición directa) -->
                <div class="mb-8">
                    <div class="text-sm uppercase text-center mb-4" style="color: var(--color-text-muted)">Cantidad</div>
                    <div class="flex items-center justify-center gap-6">
                        <button onclick="decreaseQuantity()" class="btn-quantity">−</button>
                        <input type="number" id="quantityInput" value="12" class="text-6xl font-bold text-center w-40 bg-transparent border-none focus:outline-none" style="color: var(--color-primary)">
                        <button onclick="increaseQuantity()" class="btn-quantity">+</button>
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="flex gap-4">
                    <button onclick="openEditModal()" class="flex-1 py-4 text-lg font-semibold rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary)">✏️ Editar detalles</button>
                    <button onclick="confirmAndNext()" class="flex-1 py-4 text-lg font-semibold rounded" style="background: var(--color-success); color: white">✅ Confirmar y seguir</button>
                </div>
            </div>

            <!-- Botón para agregar artículo -->
            <button onclick="openAddModal()" class="w-full py-4 text-lg font-semibold rounded" style="background: var(--color-warning); color: white">➕ Agregar artículo nuevo</button>
        </main>

        <!-- Modal: Editar detalles -->
        <div id="editModal" class="modal">
            <div class="bg-white dark:bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4" style="background: var(--color-bg-elevated)">
                <h2 class="text-2xl font-bold mb-4">Editar detalles</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Tamaño</label>
                        <input type="text" id="editSize" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Color</label>
                        <input type="text" id="editColor" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">N/P</label>
                        <input type="text" id="editNP" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                </div>
                <div class="flex gap-4 mt-6">
                    <button onclick="closeEditModal()" class="flex-1 py-3 rounded" style="background: var(--color-bg-surface)">Cancelar</button>
                    <button onclick="saveEditDetails()" class="flex-1 py-3 rounded" style="background: var(--color-primary); color: var(--color-bg-base)">Guardar</button>
                </div>
            </div>
        </div>

        <!-- Modal: Agregar artículo -->
        <div id="addModal" class="modal">
            <div class="bg-white dark:bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4" style="background: var(--color-bg-elevated)">
                <h2 class="text-2xl font-bold mb-4">Agregar artículo nuevo</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Código AX</label>
                        <input type="text" id="addCodeAX" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Descripción</label>
                        <input type="text" id="addDesc" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Tamaño</label>
                        <input type="text" id="addSize" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Color</label>
                        <input type="text" id="addColor" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">N/P</label>
                        <input type="text" id="addNP" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Cantidad</label>
                        <input type="number" id="addQuantity" value="1" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">U.M.</label>
                        <input type="text" id="addUM" value="PZA" class="w-full p-3 rounded" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                    </div>
                </div>
                <div class="flex gap-4 mt-6">
                    <button onclick="closeAddModal()" class="flex-1 py-3 rounded" style="background: var(--color-bg-surface)">Cancelar</button>
                    <button onclick="saveNewArticle()" class="flex-1 py-3 rounded" style="background: var(--color-warning); color: white">Agregar</button>
                </div>
            </div>
        </div>

        <!-- Modal: Lista de artículos -->
        <div id="listModal" class="modal">
            <div class="bg-white dark:bg-slate-800 rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto" style="background: var(--color-bg-elevated)">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold">Lista de artículos</h2>
                    <button onclick="closeListModal()" class="text-2xl">&times;</button>
                </div>
                <div id="listContainer"></div>
            </div>
        </div>

        <!-- Modal: Búsqueda -->
        <div id="searchModal" class="modal">
            <div class="bg-white dark:bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4" style="background: var(--color-bg-elevated)">
                <h2 class="text-2xl font-bold mb-4">Buscar artículo</h2>
                <input type="text" id="searchInput" placeholder="ITEM, Código o Descripción" class="w-full p-3 rounded mb-4" style="background: var(--color-bg-surface); color: var(--color-text-primary); border: 2px solid var(--color-primary)">
                <div id="searchResults" class="max-h-96 overflow-y-auto"></div>
                <button onclick="closeSearchModal()" class="w-full py-3 rounded mt-4" style="background: var(--color-bg-surface)">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let articles = [];
        let currentIndex = 0;
        let originalData = [];
        let currentFileIdentifier = null;

        // Verificar progreso guardado al cargar la página
        window.addEventListener('DOMContentLoaded', function() {
            const savedIdentifier = localStorage.getItem('inventario_fileIdentifier');
            const savedArticles = localStorage.getItem('inventario_articles');
            
            if (savedIdentifier && savedArticles) {
                if (confirm('Se encontró un inventario en progreso. ¿Desea continuar con él?\n\nPresione "Aceptar" para continuar o "Cancelar" para empezar uno nuevo.')) {
                    restoreSession();
                } else {
                    clearSession();
                }
            }
        });

        function restoreSession() {
            const savedArticles = JSON.parse(localStorage.getItem('inventario_articles'));
            const savedIndex = parseInt(localStorage.getItem('inventario_currentIndex') || '0');
            const savedIdentifier = localStorage.getItem('inventario_fileIdentifier');
            
            articles = savedArticles;
            currentIndex = savedIndex;
            currentFileIdentifier = savedIdentifier;
            
            renderArticle();
            updateProgress();
            
            document.getElementById('uploadSection').classList.add('hidden');
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('articleCard').classList.remove('hidden');
        }

        function clearSession() {
            localStorage.removeItem('inventario_articles');
            localStorage.removeItem('inventario_currentIndex');
            localStorage.removeItem('inventario_fileIdentifier');
            currentFileIdentifier = null;
        }

        // Cargar archivo CSV
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const csv = event.target.result;
                
                // Generar identificador único del archivo basado en contenido
                const fileIdentifier = generateFileIdentifier(csv);
                
                // Si hay progreso guardado de otro archivo, preguntar antes de sobrescribir
                const savedIdentifier = localStorage.getItem('inventario_fileIdentifier');
                if (savedIdentifier && savedIdentifier !== fileIdentifier) {
                    if (!confirm('Ya existe un inventario en progreso de otro archivo. ¿Desea descartarlo y empezar con este nuevo archivo?')) {
                        document.getElementById('csvFile').value = '';
                        return;
                    }
                    clearSession();
                }
                
                // Si es el mismo archivo con progreso, preguntar si desea continuar o reiniciar
                if (savedIdentifier === fileIdentifier) {
                    if (!confirm('Este archivo ya tiene progreso guardado. ¿Desea continuar donde lo dejó?\n\nPresione "Aceptar" para continuar o "Cancelar" para reiniciar desde cero.')) {
                        clearSession();
                    }
                }
                
                currentFileIdentifier = fileIdentifier;
                parseCSV(csv);
                loadFromLocalStorage();
                renderArticle();
                updateProgress();
                document.getElementById('uploadSection').classList.add('hidden');
                document.getElementById('progressSection').classList.remove('hidden');
                document.getElementById('articleCard').classList.remove('hidden');
            };
            reader.readAsText(file);
        });

        function generateFileIdentifier(csvContent) {
            // Generar hash simple compatible con UTF-8
            const lines = csvContent.split(/\r?\n/).filter(line => line.trim());
            const firstLine = lines[0];
            const lineCount = lines.length;
            
            // Calcular hash sumando códigos de caracteres
            let hash = 0;
            const str = firstLine + lineCount;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36).substring(0, 20);
        }

        function parseCSV(csv) {
            const lines = csv.split(/\r?\n/).filter(line => line.trim());
            
            articles = [];
            originalData = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length < 8) continue;
                
                const article = {
                    item: values[0].trim(),
                    codigoAX: values[1].trim(),
                    descripcion: values[2].trim(),
                    tamano: values[3].trim(),
                    color: values[4].trim(),
                    np: values[5].trim(),
                    cantidad: parseInt(values[6]) || 0,
                    um: values[7].trim(),
                    originalCantidad: parseInt(values[6]) || 0,
                    estado: 'pendiente'
                };
                
                articles.push(article);
                originalData.push({...article});
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"' && (i === 0 || line[i-1] !== '\\')) {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else if (char !== '"' || inQuotes) {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }

        function renderArticle() {
            if (articles.length === 0) return;
            
            const article = articles[currentIndex];
            
            document.getElementById('articlePosition').textContent = `${currentIndex + 1} / ${articles.length}`;
            document.getElementById('articleCode').textContent = article.codigoAX || '—';
            document.getElementById('articleDesc').textContent = article.descripcion || '—';
            document.getElementById('articleSize').textContent = article.tamano || '—';
            document.getElementById('articleColor').textContent = article.color || '—';
            document.getElementById('articleNP').textContent = article.np || '—';
            document.getElementById('articleUM').textContent = article.um || '—';
            document.getElementById('quantityInput').value = article.cantidad;
            
            updateStatusBadge();
        }

        function updateStatusBadge() {
            const article = articles[currentIndex];
            const badge = document.getElementById('statusBadge');
            
            badge.className = 'status-badge';
            
            if (article.estado === 'nuevo') {
                badge.classList.add('status-new');
                badge.innerHTML = '⚠️ Nuevo';
            } else if (article.estado === 'confirmado') {
                badge.classList.add('status-confirmed');
                badge.innerHTML = '✅ Confirmado';
            } else if (article.estado === 'modificado') {
                badge.classList.add('status-modified');
                badge.innerHTML = '✏️ Modificado';
            } else {
                badge.classList.add('status-pending');
                badge.innerHTML = '⬜ Pendiente';
            }
        }

        function increaseQuantity() {
            const input = document.getElementById('quantityInput');
            input.value = parseInt(input.value) + 1;
            updateArticleQuantity();
        }

        function decreaseQuantity() {
            const input = document.getElementById('quantityInput');
            const newValue = parseInt(input.value) - 1;
            input.value = Math.max(0, newValue);
            updateArticleQuantity();
        }

        document.getElementById('quantityInput').addEventListener('change', updateArticleQuantity);

        function updateArticleQuantity() {
            const article = articles[currentIndex];
            const newQuantity = parseInt(document.getElementById('quantityInput').value) || 0;
            
            article.cantidad = newQuantity;
            
            if (article.estado !== 'nuevo') {
                if (newQuantity !== article.originalCantidad) {
                    article.estado = 'modificado';
                }
            }
            
            updateStatusBadge();
            saveToLocalStorage();
        }

        function confirmAndNext() {
            const article = articles[currentIndex];
            
            if (article.estado === 'pendiente') {
                article.estado = 'confirmado';
            }
            
            updateStatusBadge();
            saveToLocalStorage();
            updateProgress();
            
            if (currentIndex < articles.length - 1) {
                nextArticle();
            }
        }

        function previousArticle() {
            if (currentIndex > 0) {
                currentIndex--;
                renderArticle();
            }
        }

        function nextArticle() {
            if (currentIndex < articles.length - 1) {
                currentIndex++;
                renderArticle();
            }
        }

        function updateProgress() {
            const reviewed = articles.filter(a => a.estado !== 'pendiente').length;
            const total = articles.length;
            const percentage = total > 0 ? (reviewed / total) * 100 : 0;
            
            document.getElementById('progressText').textContent = `${reviewed} / ${total} revisados`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
        }

        function openEditModal() {
            const article = articles[currentIndex];
            document.getElementById('editSize').value = article.tamano;
            document.getElementById('editColor').value = article.color;
            document.getElementById('editNP').value = article.np;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveEditDetails() {
            const article = articles[currentIndex];
            
            article.tamano = document.getElementById('editSize').value;
            article.color = document.getElementById('editColor').value;
            article.np = document.getElementById('editNP').value;
            
            if (article.estado !== 'nuevo') {
                article.estado = 'modificado';
            }
            
            renderArticle();
            saveToLocalStorage();
            closeEditModal();
        }

        function openAddModal() {
            document.getElementById('addCodeAX').value = '';
            document.getElementById('addDesc').value = '';
            document.getElementById('addSize').value = '';
            document.getElementById('addColor').value = '';
            document.getElementById('addNP').value = '';
            document.getElementById('addQuantity').value = '1';
            document.getElementById('addUM').value = 'PZA';
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function saveNewArticle() {
            const maxItem = Math.max(...articles.map(a => parseInt(a.item) || 0), 0);
            const newItem = (maxItem + 1).toString();
            
            const newArticle = {
                item: newItem,
                codigoAX: document.getElementById('addCodeAX').value,
                descripcion: document.getElementById('addDesc').value,
                tamano: document.getElementById('addSize').value,
                color: document.getElementById('addColor').value,
                np: document.getElementById('addNP').value,
                cantidad: parseInt(document.getElementById('addQuantity').value) || 0,
                um: document.getElementById('addUM').value,
                originalCantidad: 0,
                estado: 'nuevo'
            };
            
            articles.push(newArticle);
            currentIndex = articles.length - 1;
            
            renderArticle();
            updateProgress();
            saveToLocalStorage();
            closeAddModal();
        }

        function openListModal() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            articles.forEach((article, index) => {
                const div = document.createElement('div');
                div.className = 'list-item' + (index === currentIndex ? ' active' : '');
                
                let statusIcon = '⬜';
                if (article.estado === 'confirmado') statusIcon = '✅';
                else if (article.estado === 'modificado') statusIcon = '✏️';
                else if (article.estado === 'nuevo') statusIcon = '⚠️';
                
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="font-bold">${statusIcon} ${article.codigoAX}</div>
                            <div class="text-sm" style="color: var(--color-text-muted)">${article.descripcion}</div>
                        </div>
                        <div class="font-bold">${article.cantidad}</div>
                    </div>
                `;
                
                div.onclick = () => {
                    currentIndex = index;
                    renderArticle();
                    closeListModal();
                };
                
                container.appendChild(div);
            });
            
            document.getElementById('listModal').classList.add('active');
        }

        function closeListModal() {
            document.getElementById('listModal').classList.remove('active');
        }

        function openSearchModal() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchModal').classList.add('active');
        }

        function closeSearchModal() {
            document.getElementById('searchModal').classList.remove('active');
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const results = document.getElementById('searchResults');
            results.innerHTML = '';
            
            if (query.length < 2) return;
            
            const matches = articles.filter(article => 
                article.item.toLowerCase().includes(query) ||
                article.codigoAX.toLowerCase().includes(query) ||
                article.descripcion.toLowerCase().includes(query) ||
                article.tamano.toLowerCase().includes(query) ||
                article.color.toLowerCase().includes(query) ||
                article.np.toLowerCase().includes(query)
            );
            
            matches.forEach((article, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="font-bold">${article.codigoAX}</div>
                    <div class="text-sm" style="color: var(--color-text-muted)">${article.descripcion}</div>
                `;
                div.onclick = () => {
                    currentIndex = articles.indexOf(article);
                    renderArticle();
                    closeSearchModal();
                };
                results.appendChild(div);
            });
        });

        function exportCSV() {
            let csvContent = 'ITEM,CODIGO AX,DESCRIPCIÓN,TAMAÑO,COLOR,N/P,CANTIDAD,U.M.,ESTADO\r\n';
            
            articles.forEach(article => {
                const row = [
                    article.item,
                    article.codigoAX,
                    article.descripcion,
                    article.tamano,
                    article.color,
                    article.np,
                    article.cantidad,
                    article.um,
                    article.estado
                ].map(value => {
                    const stringValue = String(value || '');
                    if (stringValue.includes(',') || stringValue.includes('"') || stringValue.includes('\n')) {
                        return '"' + stringValue.replace(/"/g, '""') + '"';
                    }
                    return stringValue;
                }).join(',');
                
                csvContent += row + '\r\n';
            });
            
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            const now = new Date();
            const timestamp = now.toISOString().slice(0, 19).replace(/[:T]/g, '-');
            
            link.setAttribute('href', url);
            link.setAttribute('download', `inventario_revisado_${timestamp}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function saveToLocalStorage() {
            localStorage.setItem('inventario_articles', JSON.stringify(articles));
            localStorage.setItem('inventario_currentIndex', currentIndex);
            if (currentFileIdentifier) {
                localStorage.setItem('inventario_fileIdentifier', currentFileIdentifier);
            }
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('inventario_articles');
            const savedIdentifier = localStorage.getItem('inventario_fileIdentifier');
            
            // Solo cargar si el identificador coincide
            if (saved && savedIdentifier === currentFileIdentifier) {
                const savedArticles = JSON.parse(saved);
                
                articles.forEach(article => {
                    const savedArticle = savedArticles.find(a => a.item === article.item);
                    if (savedArticle) {
                        article.cantidad = savedArticle.cantidad;
                        article.estado = savedArticle.estado;
                        article.tamano = savedArticle.tamano;
                        article.color = savedArticle.color;
                        article.np = savedArticle.np;
                    }
                });
                
                savedArticles.forEach(savedArticle => {
                    if (savedArticle.estado === 'nuevo') {
                        const exists = articles.find(a => a.item === savedArticle.item);
                        if (!exists) {
                            articles.push(savedArticle);
                        }
                    }
                });
                
                const savedIndex = localStorage.getItem('inventario_currentIndex');
                if (savedIndex !== null) {
                    currentIndex = parseInt(savedIndex);
                }
            }
        }

        function resetInventory() {
            if (confirm('⚠️ ADVERTENCIA\n\n¿Está seguro que desea reiniciar el inventario?\n\nEsto borrará TODO el progreso guardado y NO se puede deshacer.\n\nPresione "Aceptar" para confirmar o "Cancelar" para mantener sus datos.')) {
                if (confirm('Confirmación final:\n\n¿Realmente desea eliminar todos los datos del inventario actual?\n\nEsta es su última oportunidad para cancelar.')) {
                    clearSession();
                    articles = [];
                    currentIndex = 0;
                    originalData = [];
                    currentFileIdentifier = null;
                    
                    document.getElementById('uploadSection').classList.remove('hidden');
                    document.getElementById('progressSection').classList.add('hidden');
                    document.getElementById('articleCard').classList.add('hidden');
                    document.getElementById('csvFile').value = '';
                    
                    alert('✅ Inventario reiniciado correctamente.\n\nPuede cargar un nuevo archivo CSV.');
                }
            }
        }
    </script>
</body>
</html>
